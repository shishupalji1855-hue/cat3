<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10haath Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --ink: #0a0a0f;
            --paper: #f5f3ee;
            --accent: #e8490f;
            --accent2: #1a6b3c;
            --steel: #2d2d3a;
            --mist: #e2dfd8;
            --gold: #c9a84c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* Header */
        .site-header {
            background: var(--ink);
            color: var(--paper);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-mark {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--paper);
        }
        .logo-mark span { color: var(--accent); }
        .header-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            background: var(--accent);
            color: white;
            padding: 3px 8px;
            border-radius: 2px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            gap: 0;
            min-height: calc(100vh - 64px);
        }

        /* Sidebar */
        .sidebar {
            background: var(--ink);
            color: var(--paper);
            padding: 2rem 1.5rem;
            border-right: 1px solid #222;
        }
        .sidebar-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 1.5rem;
        }

        /* Category Buttons */
        .cat-btn {
            width: 100%;
            padding: 0.85rem 1.1rem;
            border: 1px solid #333;
            background: transparent;
            color: #888;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            transition: all 0.18s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
        }
        .cat-btn:hover { border-color: #555; color: #ccc; background: #111; }
        .cat-btn.active {
            border-color: var(--accent);
            color: var(--paper);
            background: #1a0a05;
        }
        .cat-btn.active::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--accent);
        }
        .cat-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            background: #333;
            padding: 2px 6px;
            border-radius: 2px;
            min-width: 28px;
            text-align: center;
        }
        .cat-btn.active .cat-num { background: var(--accent); color: white; }

        /* Service Selector */
        .service-grid {
            display: grid;
            gap: 0.45rem;
            margin-top: 1.5rem;
        }
        .svc-btn {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1px solid #2a2a2a;
            background: #111;
            color: #999;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            cursor: pointer;
            text-align: left;
            border-radius: 3px;
            transition: all 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .svc-btn:hover { border-color: #444; color: #ccc; background: #161616; }
        .svc-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: #1a1508;
        }
        .svc-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; }
        .svc-btn.active .svc-dot { background: var(--gold); }

        /* Main Content */
        .content-area {
            padding: 2.5rem 2.5rem 2rem;
            background: var(--paper);
            overflow-y: auto;
        }

        /* Section Header */
        .section-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--mist);
        }
        .section-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.62rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.4rem;
        }
        .section-title {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--ink);
            line-height: 1.1;
        }
        .section-desc {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.4rem;
            font-weight: 400;
        }

        /* Form Card */
        .form-card {
            background: white;
            border: 1px solid var(--mist);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
        }
        .form-card-header {
            background: var(--steel);
            color: var(--paper);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .form-card-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .form-card-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            background: rgba(255,255,255,0.12);
            padding: 3px 8px;
            border-radius: 2px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .form-body { padding: 1.5rem; }

        /* Field Groups */
        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .field-row.full { grid-template-columns: 1fr; }
        .field-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .field-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #555;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .field-symbol {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 1px 5px;
            border-radius: 2px;
            font-weight: 700;
        }
        .sym-hash { background: #e8f4ec; color: var(--accent2); }
        .sym-dollar { background: #fff3e8; color: var(--accent); }
        .sym-auto { background: #f0f0f5; color: #888; }
        .field-input {
            padding: 0.65rem 0.85rem;
            border: 1.5px solid var(--mist);
            border-radius: 4px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.88rem;
            color: var(--ink);
            background: var(--paper);
            transition: all 0.15s;
            outline: none;
        }
        .field-input:focus { border-color: var(--ink); background: white; }
        .field-input::placeholder { color: #bbb; font-size: 0.82rem; }
        .field-input.id-field {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            border-color: #ffc89a;
            background: #fffaf5;
        }
        .auto-field {
            padding: 0.65rem 0.85rem;
            border: 1.5px dashed var(--mist);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: #aaa;
            background: #fafafa;
            cursor: not-allowed;
        }

        /* Submit */
        .submit-bar {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--mist);
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .btn-submit {
            padding: 0.8rem 2rem;
            background: var(--ink);
            color: var(--paper);
            border: none;
            border-radius: 4px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-submit:hover { background: var(--accent); transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(0); }
        .btn-reset {
            padding: 0.8rem 1.2rem;
            background: transparent;
            color: #888;
            border: 1.5px solid var(--mist);
            border-radius: 4px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-reset:hover { border-color: #999; color: var(--ink); }

        /* QR PANEL */
        .qr-panel {
            background: var(--steel);
            color: var(--paper);
            padding: 2rem 1.5rem;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .qr-panel-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #666;
            align-self: flex-start;
            width: 100%;
        }
        .qr-placeholder {
            width: 200px;
            height: 200px;
            border: 2px dashed #3a3a4a;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: #444;
        }
        .qr-box {
            background: white;
            padding: 12px;
            border: 3px solid #000;
            border-radius: 12px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .btn-download {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            color: #888;
            border: 1px solid #333;
            border-radius: 4px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.15s;
            display: none;
        }
        .btn-download:hover { border-color: var(--gold); color: var(--gold); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.85rem 1.25rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9000;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            min-width: 280px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--accent2); color: white; }
        .toast.error { background: #c0392b; color: white; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

                { id: "Gadi_Number", header: "Gadi_Number", label: "Vehicle Number", type: "text", ph: "UK07-AB-1234", required: true },
                { id: "Drive_Link", header: "Drive_Link", label: "Drive Link (Protected)", type: "text", ph: "Drive Folder/File Link", required: true },
                { id: "Drive_Password", header: "Drive_Password", label: "PDF Password", type: "text", ph: "Owner shared password", required: true },
                { id: "Password_Free_PDF_Link", header: "Password_Free_PDF_Link", label: "Free PDF Link", type: "text", ph: "Direct Open PDF (Optional)" }
            ]
        }
    };

    let activeCat = 1;
    let activeSvc = "P00_Human";

    function selectCategory(catId) {
        activeCat = catId;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`cat${catId}`).classList.add('active');
        
        const cat = CATEGORIES[catId];
        document.getElementById('mainTag').innerText = `// ${cat.tag}`;
        document.getElementById('mainTitle').innerText = cat.name;
        
        renderServiceList(cat.services);
        selectService(cat.services[0]);
    }

    function renderServiceList(services) {
        const grid = document.getElementById('serviceGrid');
        grid.innerHTML = "";
        services.forEach(svcId => {
            const btn = document.createElement('button');
            btn.className = "svc-btn";
            btn.id = `svc_${svcId}`;
            btn.innerHTML = `<span>${svcId}</span><span class="svc-dot"></span>`;
            btn.onclick = () => selectService(svcId);
            grid.appendChild(btn);
        });
    }

    function selectService(svcId) {
        activeSvc = svcId;
        document.querySelectorAll('.svc-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`svc_${svcId}`);
        if(activeBtn) activeBtn.classList.add('active');
        
        renderForm(svcId);
    }

    function renderForm(svcId) {
        const svc = SERVICES[svcId];
        const container = document.getElementById('formContainer');
        
        let fieldsHtml = "";
        svc.fields.forEach((f, idx) => {
            const groupHtml = `
                <div class="field-group">
                    <label class="field-label">${f.label} ${f.required ? '<span class="text-red-500">*</span>' : ''}</label>
                    <input type="${f.type}" id="f_${f.id}" class="field-input" placeholder="${f.ph || ''}" value="${f.default || ''}">
                </div>
            `;
            fieldsHtml += groupHtml;
        });

        container.innerHTML = `
            <div class="form-card">
                <div class="form-card-header">
                    <div class="form-card-title">${svcId}</div>
                    <div class="form-card-badge">${svc.label}</div>
                </div>
                <div class="form-body">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${fieldsHtml}
                    </div>
                    <div class="submit-bar">
                        <button class="btn-submit" onclick="handleSubmit()">
                            <span id="btnText">Generate QR & Save</span>
                            <div class="spinner" id="btnSpinner"></div>
                        </button>
                        <button class="btn-reset" onclick="resetForm()">Reset</button>
                    </div>
                </div>
            </div>
        `;
    }

    async function handleSubmit() {
        const svc = SERVICES[activeSvc];
        const data = { Timestamp: new Date().toLocaleString() };
        let valid = true;

        svc.fields.forEach(f => {
            const val = document.getElementById(`f_${f.id}`).value.trim();
            if(f.required && !val) {
                valid = false;
                document.getElementById(`f_${f.id}`).classList.add('border-red-500');
            } else {
                data[f.header] = val; // Correct header mapping
                document.getElementById(`f_${f.id}`).classList.remove('border-red-500');
            }
        });

        if(!valid) return showToast("Please fill all required fields", "error");

        setLoading(true);
        try {
            // Save to SheetDB
            const response = await fetch(`${SHEETDB_URL}?sheet=${activeSvc}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [data] })
            });

            if(!response.ok) throw new Error("SheetDB Save Failed");

            // Generate QR
            generateQR(data);
            showToast("QR Generated & Data Saved!", "success");
        } catch (err) {
            console.error(err);
            showToast("Error: " + err.message, "error");
        } finally {
            setLoading(false);
        }
    }

    function generateQR(data) {
        const qrContainer = document.getElementById('qrCode');
        qrContainer.innerHTML = "";
        
        let qrData = "";
        if(activeSvc === "P09_WiFi") {
            // WiFi QR format: WIFI:S:SSID;T:WPA;P:PASSWORD;;
            qrData = `WIFI:S:${data.SSID};T:${data.Security || 'WPA'};P:${data.Password};;`;
            document.getElementById('qrLinkInfo').classList.add('hidden');
        } else {
            // Encode important data for scanner
            const payload = {
                t: activeSvc,
                c: data.Cust_ID
            };
            const encoded = btoa(JSON.stringify(payload));
            qrData = `${SCANNER_URL}?s=${encoded}`;
            
            document.getElementById('qrLinkText').innerText = qrData;
            document.getElementById('qrLinkInfo').classList.remove('hidden');
        }

        new QRCode(qrContainer, {
            text: qrData,
            width: 180,
            height: 180,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        document.getElementById('qrFooter').innerText = data.Cust_ID || data.Person_Name || "";
        document.getElementById('qrPlaceholder').style.display = "none";
        document.getElementById('qrCapture').style.display = "flex";
        document.getElementById('btnDownload').style.display = "block";
    }

    function downloadQR() {
        html2canvas(document.getElementById('qrCapture')).then(canvas => {
            const link = document.createElement('a');
            link.download = `10haath_${activeSvc}_${activeSvc === 'P09_WiFi' ? 'WiFi' : 'QR'}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function copyQRLink() {
        const link = document.getElementById('qrLinkText').innerText;
        navigator.clipboard.writeText(link);
        showToast("Link copied to clipboard", "success");
    }

    function setLoading(isLoading) {
        document.getElementById('btnText').style.display = isLoading ? 'none' : 'inline';
        document.getElementById('btnSpinner').style.display = isLoading ? 'block' : 'none';
        document.querySelector('.btn-submit').disabled = isLoading;
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.className = `toast show ${type === 'success' ? 'success' : 'error'}`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function resetForm() {
        renderForm(activeSvc);
        document.getElementById('qrPlaceholder').style.display = "flex";
        document.getElementById('qrCapture').style.display = "none";
        document.getElementById('btnDownload').style.display = "none";
        document.getElementById('qrLinkInfo').classList.add('hidden');
    }

    // Init
    selectCategory(1);
</script>
</body>
</html>
