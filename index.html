<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>10haath Master Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --ink: #1b1b1b;
            --muted: #5b5b5b;
            --paper: #f7f3ea;
            --accent: #e8490f;
            --accent-2: #1a6b3c;
            --card: #ffffff;
            --border: #e2d8c5;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Space Grotesk", system-ui, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at top, #fff7e3, var(--paper));
            min-height: 100vh;
        }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 28px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }
        .brand h1 { margin: 0; font-size: 28px; letter-spacing: -0.5px; }
        .brand h1 span { color: var(--accent); }
        .brand p { margin: 0; color: var(--muted); font-size: 14px; font-weight: 500; }
        .grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .section-title { 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: var(--muted); 
            margin: 0 0 16px; 
            font-weight: 700;
        }
        .pill {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            text-align: left;
            transition: all 0.2s;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pill:hover { border-color: var(--accent); background: #fffaf5; }
        .pill.active { border-color: var(--accent); background: var(--accent); color: white; }
        .pill .cat-id { font-family: "IBM Plex Mono", monospace; font-size: 10px; opacity: 0.7; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        form { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .full-width { grid-column: 1 / -1; }
        .field-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
        input {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent); }
        
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 14px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary { background: var(--ink); color: white; flex: 2; }
        .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
        .btn-secondary { background: #eee; color: var(--muted); flex: 1; }
        
        .qr-output {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            border: 2px dashed var(--border);
            border-radius: 18px;
            background: #fafafa;
            padding: 20px;
        }
        #qr { background: white; padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
        .qr-info { margin-top: 16px; text-align: center; }
        .mono { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); word-break: break-all; }
        
        .loader {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            form { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <div class="brand">
                <h1>10<span>haath</span> Master Dashboard</h1>
                <p>QR/NFC Builder for Category 1, 2, 3 & 4</p>
            </div>
            <div class="note mono" id="apiStatus">API: vpozwh7cptzc4</div>
        </header>

        <div class="grid">
            <aside class="sidebar">
                <section class="card">
                    <h2 class="section-title">1. Category</h2>
                    <div id="categoryButtons"></div>
                </section>

                <section class="card">
                    <h2 class="section-title">2. Service Type</h2>
                    <select id="serviceSelect"></select>
                </section>
            </aside>

            <main class="main-content">
                <section class="card">
                    <h2 class="section-title">3. Builder Form</h2>
                    <form id="builderForm"></form>
                    <div class="actions">
                        <button class="btn btn-primary" id="submitBtn">
                            <span id="btnText">Generate QR & Save</span>
                            <div class="loader" id="btnLoader"></div>
                        </button>
                        <button class="btn btn-secondary" id="resetBtn">Reset</button>
                    </div>
                </section>

                <section class="card" style="margin-top: 24px;">
                    <h2 class="section-title">4. QR Output</h2>
                    <div class="qr-output" id="qrOutput">
                        <div id="qrPlaceholder" style="color: #ccc; font-weight: 600;">Fill form to generate QR</div>
                        <div id="qrContainer" style="display: none;">
                            <div id="qr"></div>
                            <div class="qr-info">
                                <div class="mono" id="qrLabel" style="font-weight: 700; color: var(--ink); margin-bottom: 4px;"></div>
                                <div class="mono" id="qrLink" style="font-size: 9px; opacity: 0.6;"></div>
                                <button onclick="copyLink()" class="btn btn-secondary" style="padding: 6px 12px; font-size: 10px; margin-top: 10px;">Copy Link</button>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const API_BASE = "https://sheetdb.io/api/v1/vpozwh7cptzc4";
        const SCANNER_BASE = new URL("scanner.html", window.location.href).href;

        const SYMBOLS = { AUTO: "!", ID: "$", BUILD: "#" };

        const categories = [
            { id: "Cat 1", label: "Human Safety" },
            { id: "Cat 2", label: "Value Safety" },
            { id: "Cat 3", label: "QR Services" },
            { id: "Cat 4", label: "Doc Vault" }
        ];

        const services = {
            P00_Human: {
                label: "Cat 1 - Human Safety Tag",
                cat: "Cat 1",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID(No.)", sym: SYMBOLS.ID, label: "Owner Code", type: "text", ph: "e.g. 1001" },
                    { key: "Person_Name", sym: SYMBOLS.BUILD, label: "Owner Name", type: "text", ph: "Full Name" },
                    { key: "Emergency1", sym: SYMBOLS.BUILD, label: "Emergency Phone", type: "number", ph: "91XXXXXXXXXX" },
                    { key: "Email1", sym: SYMBOLS.BUILD, label: "Alert Email 1", type: "email", ph: "primary@mail.com" },
                    { key: "Email2", sym: SYMBOLS.BUILD, label: "Alert Email 2", type: "email", ph: "secondary@mail.com" },
                    { key: "WACompany", sym: SYMBOLS.BUILD, label: "WA Company No", type: "number", ph: "919718531983", def: "919718531983" },
                    { key: "Owner_PIN", sym: SYMBOLS.BUILD, label: "Owner PIN", type: "password", ph: "4-Digit PIN" }
                ]
            },
            P00_Value: {
                label: "Cat 2 - Value Safety Tag",
                cat: "Cat 2",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID(No.)", sym: SYMBOLS.ID, label: "Asset ID", type: "text", ph: "e.g. MH12AB1234" },
                    { key: "Person_Name", sym: SYMBOLS.BUILD, label: "Owner Name", type: "text", ph: "Full Name" },
                    { key: "Email1", sym: SYMBOLS.BUILD, label: "Alert Email 1", type: "email", ph: "primary@mail.com" },
                    { key: "Email2", sym: SYMBOLS.BUILD, label: "Alert Email 2", type: "email", ph: "secondary@mail.com" },
                    { key: "WACompany", sym: SYMBOLS.BUILD, label: "WA Company No", type: "number", ph: "919718531983", def: "919718531983" }
                ]
            },
            P01_Pay: {
                label: "Cat 3 - Fast Pay QR",
                cat: "Cat 3",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID", sym: SYMBOLS.ID, label: "Merchant ID", type: "text", ph: "e.g. P101" },
                    { key: "Name", sym: SYMBOLS.BUILD, label: "Merchant Name", type: "text", ph: "Name on UPI" },
                    { key: "UPI_ID", sym: SYMBOLS.BUILD, label: "UPI ID", type: "text", ph: "example@upi" }
                ]
            },
            P03_Biz: {
                label: "Cat 3 - Digital Biz Card",
                cat: "Cat 3",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID", sym: SYMBOLS.ID, label: "Biz ID", type: "text", ph: "e.g. B101" },
                    { key: "Name", sym: SYMBOLS.BUILD, label: "Full Name", type: "text", ph: "Full Name" },
                    { key: "Job", sym: SYMBOLS.BUILD, label: "Designation", type: "text", ph: "Job Title" },
                    { key: "Phone", sym: SYMBOLS.BUILD, label: "Phone No", type: "number", ph: "91XXXXXXXXXX" },
                    { key: "Email", sym: SYMBOLS.BUILD, label: "Email", type: "email", ph: "email@biz.com" },
                    { key: "Instagram", sym: SYMBOLS.BUILD, label: "Instagram URL", type: "text", ph: "https://ig.com/..." },
                    { key: "LinkedIn", sym: SYMBOLS.BUILD, label: "LinkedIn URL", type: "text", ph: "https://li.com/..." },
                    { key: "Website", sym: SYMBOLS.BUILD, label: "Website", type: "text", ph: "https://..." }
                ]
            },
            P04_Review: {
                label: "Cat 3 - Google Review",
                cat: "Cat 3",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID", sym: SYMBOLS.ID, label: "Shop ID", type: "text", ph: "e.g. R101" },
                    { key: "Business_Name", sym: SYMBOLS.BUILD, label: "Shop Name", type: "text", ph: "Shop Name" },
                    { key: "Review_URL", sym: SYMBOLS.BUILD, label: "Review Link", type: "text", ph: "Google Review URL" }
                ]
            },
            P08_Resume: {
                label: "Cat 3 - Resume QR",
                cat: "Cat 3",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID", sym: SYMBOLS.ID, label: "Resume ID", type: "text", ph: "e.g. CV101" },
                    { key: "Name", sym: SYMBOLS.BUILD, label: "Full Name", type: "text", ph: "Your Name" },
                    { key: "Resume_Link", sym: SYMBOLS.BUILD, label: "Drive Link", type: "text", ph: "PDF Drive Link" }
                ]
            },
            P09_WiFi: {
                label: "Cat 3 - WiFi Connect",
                cat: "Cat 3",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID", sym: SYMBOLS.ID, label: "WiFi ID", type: "text", ph: "e.g. W101" },
                    { key: "SSID", sym: SYMBOLS.BUILD, label: "WiFi SSID", type: "text", ph: "Network Name" },
                    { key: "Password", sym: SYMBOLS.BUILD, label: "Password", type: "text", ph: "WiFi Password" },
                    { key: "Security", sym: SYMBOLS.BUILD, label: "Security", type: "text", ph: "WPA/WPA2", def: "WPA" }
                ]
            },
            P11_Challan: {
                label: "Cat 3 - Vehicle Challan",
                cat: "Cat 3",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID", sym: SYMBOLS.ID, label: "Challan ID", type: "text", ph: "e.g. C101" },
                    { key: "Owner_Name", sym: SYMBOLS.BUILD, label: "Owner Name", type: "text", ph: "Owner Name" },
                    { key: "Vehicle_No", sym: SYMBOLS.BUILD, label: "Vehicle No", type: "text", ph: "MH12AB1234" }
                ]
            },
            P12_Invite: {
                label: "Cat 3 - Event Invite",
                cat: "Cat 3",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID", sym: SYMBOLS.ID, label: "Event ID", type: "text", ph: "e.g. E101" },
                    { key: "PIN", sym: SYMBOLS.BUILD, label: "Event PIN", type: "text", ph: "4-Digit Access PIN" },
                    { key: "Event_Name", sym: SYMBOLS.BUILD, label: "Event Name", type: "text", ph: "Wedding/Party" },
                    { key: "Date", sym: SYMBOLS.BUILD, label: "Event Date", type: "text", ph: "DD-MM-YYYY" },
                    { key: "Maps_Link", sym: SYMBOLS.BUILD, label: "Location Link", type: "text", ph: "Google Maps Link" },
                    { key: "Video_Link", sym: SYMBOLS.BUILD, label: "Invite Video", type: "text", ph: "YouTube/Drive Link" }
                ]
            },
            P13_Doc: {
                label: "Cat 4 - Doc Vault",
                cat: "Cat 4",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID", sym: SYMBOLS.ID, label: "Doc ID", type: "text", ph: "e.g. D101" },
                    { key: "Name", sym: SYMBOLS.BUILD, label: "Owner Name", type: "text", ph: "Full Name" },
                    { key: "Gadi_Number", sym: SYMBOLS.BUILD, label: "Vehicle No", type: "text", ph: "UK07-AB-1234" },
                    { key: "Drive_Link", sym: SYMBOLS.BUILD, label: "Secure Link", type: "text", ph: "Drive Folder/File Link" },
                    { key: "Drive_Password", sym: SYMBOLS.BUILD, label: "PDF Password", type: "text", ph: "Password for PDF" },
                    { key: "Password_Free_PDF_Link", sym: SYMBOLS.BUILD, label: "Free PDF Link", type: "text", ph: "Direct Open Link (Optional)" }
                ]
            },
            P15_Static: {
                label: "Cat 3 - Static Location",
                cat: "Cat 3",
                fields: [
                    { key: "Timestamp", sym: SYMBOLS.AUTO },
                    { key: "Cust_ID(No.)", sym: SYMBOLS.ID, label: "Location ID", type: "text", ph: "e.g. L101" },
                    { key: "PIN", sym: SYMBOLS.BUILD, label: "Access PIN", type: "text", ph: "4-Digit PIN" },
                    { key: "Name of location", sym: SYMBOLS.BUILD, label: "Location Name", type: "text", ph: "Home/Office" },
                    { key: "Written Address", sym: SYMBOLS.BUILD, label: "Full Address", type: "text", ph: "Street, City, State" },
                    { key: "Maps_Link", sym: SYMBOLS.BUILD, label: "Maps Link", type: "text", ph: "Google Maps Link" },
                    { key: "Video_Link", sym: SYMBOLS.BUILD, label: "Video Tour", type: "text", ph: "YouTube/Drive Link" }
                ]
            }
        };

        let activeCat = "Cat 1";
        let activeSvc = "P00_Human";

        function base64UrlEncode(obj) {
            const json = JSON.stringify(obj);
            const b64 = btoa(unescape(encodeURIComponent(json)));
            return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
        }

        function renderCategories() {
            const container = document.getElementById('categoryButtons');
            container.innerHTML = "";
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `pill ${cat.id === activeCat ? 'active' : ''}`;
                btn.innerHTML = `<span>${cat.label}</span><span class="cat-id">${cat.id}</span>`;
                btn.onclick = () => {
                    activeCat = cat.id;
                    renderCategories();
                    renderServiceList();
                };
                container.appendChild(btn);
            });
        }

        function renderServiceList() {
            const select = document.getElementById('serviceSelect');
            select.innerHTML = "";
            const filtered = Object.entries(services).filter(([_, s]) => s.cat === activeCat);
            filtered.forEach(([id, s]) => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = s.label;
                select.appendChild(opt);
            });
            activeSvc = filtered[0] ? filtered[0][0] : "";
            renderForm();
        }

        function renderForm() {
            const form = document.getElementById('builderForm');
            form.innerHTML = "";
            if(!activeSvc) return;

            const svc = services[activeSvc];
            svc.fields.filter(f => f.sym !== SYMBOLS.AUTO).forEach(f => {
                const group = document.createElement('div');
                group.className = "field-group";
                group.innerHTML = `
                    <label>${f.label} (${f.sym})</label>
                    <input type="${f.type}" id="f_${f.key}" placeholder="${f.ph}" value="${f.def || ''}" required>
                `;
                form.appendChild(group);
            });
        }

        async function handleSubmit() {
            const svc = services[activeSvc];
            const payload = { Timestamp: new Date().toLocaleString() };
            let valid = true;

            svc.fields.filter(f => f.sym !== SYMBOLS.AUTO).forEach(f => {
                const el = document.getElementById(`f_${f.key}`);
                const val = el.value.trim();
                if(!val) {
                    valid = false;
                    el.style.borderColor = "red";
                } else {
                    payload[f.key] = val;
                    el.style.borderColor = "";
                }
            });

            if(!valid) return alert("Please fill all required fields!");

            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            btnText.style.display = "none";
            btnLoader.style.display = "block";

            try {
                const res = await fetch(`${API_BASE}?sheet=${activeSvc}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(!res.ok) throw new Error("SheetDB sync failed");

                generateQR(payload);
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btnText.style.display = "block";
                btnLoader.style.display = "none";
            }
        }

        function generateQR(data) {
            const container = document.getElementById('qr');
            container.innerHTML = "";
            
            const idKey = activeSvc.includes('P00') || activeSvc === 'P15' ? 'Cust_ID(No.)' : 'Cust_ID';
            const custId = data[idKey];
            const name = data.Person_Name || data.Name || data.Business_Name || data['Name of location'] || "";

            const secret = base64UrlEncode({
                t: activeSvc,
                c: custId,
                n: name
            });

            const scanUrl = `${SCANNER_BASE}?s=${secret}`;
            
            new QRCode(container, {
                text: scanUrl,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff"
            });

            document.getElementById('qrPlaceholder').style.display = "none";
            document.getElementById('qrContainer').style.display = "flex";
            document.getElementById('qrLabel').innerText = `${custId} | ${name}`;
            document.getElementById('qrLink').innerText = scanUrl;
            document.getElementById('qrOutput').scrollIntoView({ behavior: 'smooth' });
        }

        function copyLink() {
            const link = document.getElementById('qrLink').innerText;
            navigator.clipboard.writeText(link);
            alert("Link copied!");
        }

        document.getElementById('serviceSelect').onchange = (e) => {
            activeSvc = e.target.value;
            renderForm();
        };

        document.getElementById('submitBtn').onclick = handleSubmit;
        document.getElementById('resetBtn').onclick = () => {
            document.getElementById('builderForm').reset();
            document.getElementById('qrContainer').style.display = "none";
            document.getElementById('qrPlaceholder').style.display = "block";
        };

        renderCategories();
        renderServiceList();
    </script>
</body>
</html>
