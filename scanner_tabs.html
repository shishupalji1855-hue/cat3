<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>10haath — Service Router</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink:     #0b0b12;
    --paper:   #f5f3ee;
    --accent:  #e8490f;
    --green:   #1a6b3c;
    --gold:    #c9a84c;
    --mist:    #e2dfd8;
    --steel:   #2d2d3a;
    --blue:    #2563eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: var(--ink); color: var(--paper); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .page { width: 100%; max-width: 480px; padding: 1.5rem; display: none; }
  .page.active { display: block; }
  .card { background: #13131e; border: 1px solid #222; border-radius: 12px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,0.5); animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .card-header { padding: 1.5rem 1.75rem 1.25rem; border-bottom: 1px solid #1e1e2e; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .card-logo { font-size: 0.85rem; font-weight: 700; letter-spacing: -0.02em; color: var(--paper); opacity: 0.4; }
  .card-logo span { color: var(--accent); }
  .service-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; border: 1px solid #333; color: #888; white-space: nowrap; }
  .card-body { padding: 1.75rem; }
  .heading-xl { font-size: 1.65rem; font-weight: 700; letter-spacing: -0.04em; line-height: 1.1; color: var(--paper); margin-bottom: 0.25rem; }
  .heading-sm { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; color: var(--paper); }
  .sub-text { font-size: 0.82rem; color: #666; line-height: 1.5; margin-top: 0.25rem; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .btn-primary { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.95rem 1.5rem; background: var(--accent); color: white; border: none; border-radius: 6px; font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.18s ease; letter-spacing: 0.01em; }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.85rem 1.5rem; background: transparent; color: var(--paper); border: 1px solid #333; border-radius: 6px; font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .btn-secondary:hover { border-color: #555; background: #1a1a28; }
  .btn-green { background: var(--green); }
  .btn-group { display: flex; flex-direction: column; gap: 0.65rem; margin-top: 1.5rem; }
  .data-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 0.85rem 0; border-bottom: 1px solid #1a1a28; gap: 1rem; }
  .data-key { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; min-width: 80px; padding-top: 2px; }
  .data-val { font-size: 0.88rem; color: #ccc; text-align: right; word-break: break-all; flex: 1; }
  .data-val.highlight { color: var(--gold); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .pin-input-group { display: flex; gap: 0.6rem; justify-content: center; margin: 1.5rem 0; }
  .pin-digit { width: 52px; height: 60px; background: #1a1a28; border: 2px solid #333; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 700; color: var(--paper); text-align: center; outline: none; transition: border-color 0.15s; caret-color: var(--accent); }
  .pin-digit:focus { border-color: var(--accent); }
  .redirect-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; gap: 1rem; }
  .loader-ring { width: 40px; height: 40px; border: 3px solid #222; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .challan-field { width: 100%; padding: 0.65rem 0.85rem; background: #1a1a28; border: 1px solid #333; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--paper); margin-bottom: 0.75rem; outline: none; }
  .challan-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin-bottom: 0.3rem; font-family: 'JetBrains Mono', monospace; }
  .avatar-circle { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--accent) 0%, #b83a0c 100%); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 700; color: white; margin-bottom: 0.75rem; }
  .divider { height: 1px; background: #1e1e2e; margin: 1rem 0; }
  .doc-item { display: flex; align-items: center; justify-content: space-between; padding: 0.85rem 1rem; background: #1a1a28; border-radius: 6px; margin-bottom: 0.5rem; border: 1px solid #222; }
  .doc-item-label { font-size: 0.82rem; color: #aaa; }
  .doc-item-link { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #7ba7ff; text-decoration: none; cursor: pointer; background: none; border: none; padding: 0; }
  .card-footer { padding: 0.85rem 1.75rem; border-top: 1px solid #1a1a28; display: flex; align-items: center; justify-content: space-between; }
  .footer-brand { font-size: 0.7rem; color: #444; }
  .footer-brand span { color: var(--accent); }
</style>
</head>
<body>

<div id="loadingScreen" class="redirect-screen">
  <div class="loader-ring"></div>
  <div class="redirect-text">Routing your request...</div>
</div>

<div id="errorPage" class="page">
  <div class="card">
    <div class="card-body" style="text-align:center;">
      <div class="heading-sm">Error</div>
      <div class="sub-text" id="errorDesc">Unknown Service</div>
    </div>
  </div>
</div>

<!-- ROLE_SELECT (Cat 1 & 2) -->
<div id="page_Role_Select" class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-logo">10<span>haath</span></div>
      <div class="service-badge" id="role_service_label">Safety QR</div>
    </div>
    <div class="card-body" style="text-align:center;">
      <div class="heading-sm" id="role_name">---</div>
      <div class="btn-group">
        <button class="btn-primary btn-green" onclick="switchToSavior()">Savior</button>
        <button class="btn-secondary" id="owner_role_btn" onclick="switchToOwner()">Owner (PIN)</button>
      </div>
    </div>
  </div>
</div>

<!-- SAVIOR_FLOW -->
<div id="page_Savior_Step1" class="page">
  <div class="card">
    <div class="card-body" style="text-align:center;">
      <div style="font-size: 3rem;">🚨</div>
      <div class="heading-sm">Gadi Alert</div>
      <a href="#" id="wa_verify_btn" target="_blank" class="btn-primary btn-green" style="margin-top:1.5rem;" onclick="goToStep2()">Verify via WhatsApp</a>
    </div>
  </div>
</div>

<div id="page_Savior_Step2" class="page">
  <div class="card">
    <div class="card-header"><div class="service-badge">Confirm Alert</div></div>
    <div class="card-body">
      <div class="challan-label">Gadi Number</div>
      <input class="challan-field" id="savior_gadi_readonly" type="text" readonly>
      <div class="challan-label">Your WhatsApp No</div>
      <input class="challan-field" id="savior_phone" type="number">
      <div class="challan-label">Problem</div>
      <textarea class="challan-field" id="savior_reason" rows="3"></textarea>
      <button class="btn-primary" id="savior_submitBtn" onclick="submitSaviorAlertExact()">Final Submit</button>
    </div>
  </div>
</div>

<!-- P13_DOC -->
<div id="page_P13_Doc" class="page">
  <div class="card">
    <div class="card-header"><div class="service-badge">Security Vault</div></div>
    <div class="card-body" style="text-align:center;">
      <div class="heading-sm" id="p13_name">---</div>
      <div id="p13_timer_view">
        <div class="heading-xl" id="p13_timer">20:00</div>
        <button class="btn-primary" onclick="requestDocAccess()">REQUEST ACCESS</button>
      </div>
      <div id="p13_folder_view" style="display:none;">
        <div class="doc-item"><span class="doc-item-label">Folder</span><a class="doc-item-link" id="p13_folderLink" href="#" target="_blank">Open</a></div>
        <input class="challan-field" id="p13_pdf_pass" type="text" placeholder="PDF Password...">
      </div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
const SHEETDB_BASE = CONFIG.SHEETDB_BASE;
const COMPANY_WA = CONFIG.COMPANY_WA;
const SCANNER_URL = CONFIG.getScannerURL();

function getParams() {
  const p = new URLSearchParams(window.location.search);
  const t = p.get('t') || '';
  const sRaw = p.get('s') || '';
  let secret = {};
  if (sRaw) try { secret = JSON.parse(atob(sRaw)); } catch (e) {}
  return { t, secret };
}

function showPage(id) {
  document.getElementById('loadingScreen').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function route() {
  const { t, secret } = getParams();
  if (!t) return;
  if (t === 'P00_Human' || t === 'P00_Value') {
    document.getElementById('role_name').textContent = secret.n || 'User';
    document.getElementById('wa_verify_btn').href = `https://wa.me/${COMPANY_WA}?text=Verify%20Alert%20for%20${secret.n}`;
    showPage('page_Role_Select');
  } else if (t === 'P13_Doc') {
    document.getElementById('p13_name').textContent = secret.n || 'User';
    showPage('page_P13_Doc');
  } else {
    // Other Category 3 routes would go here (redirects etc)
    window.location.href = secret.u || secret.d || secret.r || '#';
  }
}

function switchToSavior() { showPage('page_Savior_Step1'); }
function goToStep2() { 
  const { secret } = getParams();
  document.getElementById('savior_gadi_readonly').value = secret.n || 'N/A';
  setTimeout(() => showPage('page_Savior_Step2'), 1500); 
}

async function submitSaviorAlertExact() {
  const phone = document.getElementById('savior_phone').value;
  const reason = document.getElementById('savior_reason').value;
  const gadi = document.getElementById('savior_gadi_readonly').value;
  const { t, secret } = getParams();
  const payload = {
    "Timestamp": new Date().toLocaleString(),
    "Cust_ID(No.)": secret.c || '',
    "Person_Name": gadi,
    "Dikkat": reason,
    "ScannerNo": phone
  };
  try {
    await fetch(`${SHEETDB_BASE}?sheet=Registration`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: [payload] })
    });
    const recipients = [secret.e1, secret.e2].filter(e => e).join(',');
    window.location.href = `mailto:${recipients}?subject=Alert%20${gadi}&body=${reason}%20Call:${phone}`;
  } catch (err) { alert(err.message); }
}

function requestDocAccess() {
  const { secret } = getParams();
  document.getElementById('p13_folderLink').href = secret.dl || '#';
  document.getElementById('p13_pdf_pass').value = secret.dp || '';
  document.getElementById('p13_timer_view').style.display = 'none';
  document.getElementById('p13_folder_view').style.display = 'block';
  // Timer logic here
}

route();
</script>
</body>
</html>
